<!DOCTYPE html>
<html lang="en">
<head>
    <title>Result summary component</title>
    <link rel="stylesheet" href="styleResults.css">
</head>
<body>
    <main class="card-container">
        
        <section class="result-panel">
            <h3 class="panel-title">Your Result</h3>

            <div class="score-circle">
                <span class="score-big">76</span>
                <span class="score-total">of 100</span>
            </div>
            <p class="result-status">Great</p>
            <p class="result-description">You scored higher than 65% of the people who have taken the test.</p>

        </section>
        <section class="summary-panel">
            <h2 class="summary-title">Summary</h2>

            <div class="summary-item reaction">
                <div class="item-left">
                <img src="icon-reaction.jpg" alt="Projects">
                <span>Reactions</span>
</div>
                
                <span class="item-score"><strong>80</strong>/100</span>
            </div>
            <div class="summary-item memory">
                <div class="item-left">
                    <img src="icon-memory.jpg" alt="Projects">
                    <span>Memory</span>
                </div>
                <span class="item-score"><strong>92</strong>/100</span>
            </div>

            <div class="summary-item verbal">
                <div class="item-left">
                    <img src="icon-verbal.jpg" alt="Projects">
                    <span>Verbal</span>
                </div>
                <span class="item-score"><strong>61</strong>/100</span>
            </div>

            <div class="summary-item visual">
                <div class="item-left">
                    <img src="icon-visual.jpg" alt="Projects">
                    <span>Visual</span>
                </div>
                <span class="item-score"><strong>72</strong>/100</span>
            </div>

            <button class="btn-continue">Continue</button>
        </section>
        
    </main>
</body>
</html>
